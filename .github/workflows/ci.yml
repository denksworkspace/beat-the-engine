name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Run unit/integration/e2e tests
        env:
          DATABASE_URL: sqlite:///./ci_chess_app.db
          ENGINE_WORKER_URL: http://127.0.0.1:8101
          REFLECTION_WORKER_URL: http://127.0.0.1:8102
        run: |
          pytest apps/api/tests -q
